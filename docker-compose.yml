services:
  codex-proxy:
    build: .
    container_name: codex-openai-proxy
    ports:
      - "7391:3033"
    volumes:
      - /home/mohakatalonya10/.codex/auth.json:/root/.codex/auth.json
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3033/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
